<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" 
integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
 crossorigin="anonymous">
</script>

    <link rel="stylesheet" href="/static/style.css">
    <title>User Dashboard</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      .full-height {
        height: 100vh; /* Full viewport height */
      }
      .sidebar {
        background-color: #8dc3d854; /* Light grey */
      }
      .side-item:hover{
        background-color: #8dc3d854; 
      }
      .side-item table tbody tr td a{
        color: #00000054; 
        background-color: #8dc3d854; 
      }
      
      .side-item :hover{
        color: #00000054; 
      }
    </style>
</head>
<body>
  <div class="row" id="header">
    <div class="col-md-12">
      <div class="col-md-4" style="display: inline-block;">
        <h3 style="margin-top: 2px;">Task Management</h3>
      </div>
      <div class="col-md-6" style="display: inline-block; text-align: right;">
        <span style="margin-left: 25px;" ><b>Name: {{session.get("user")[1]}}</b></span>
      </div>
      <a href="user_logout">Logout</a>
    </div>
  </div>
  <div class="container-fluid">
    <div class="row full-height">
      <!-- Sidebar -->
      <div class="col-md-2 d-flex flex-column p-3" style="background-color: #D4F6CC; height: 100%; padding:0px">
        <table class="table">
          <tr>
            <td class="side-item" style="text-align: center;" >
              <a href="user_dashboard" type="button" class="link">Dashboard</a>
            </td>
          </tr>
          <tr>
            <td class="side-item" style="text-align: center;">
              <a href="apply_leave" type="button" class="link" id="view_leave" style="text-decoration: none;">Apply leave</a>
            </td>
          </tr>
          <!-- <tr>
            <td style="text-align: center;">
              <a href="update_task" type="button" class="link" id="create_task" style="text-decoration: none;">Update Task</a>
            </td>
          </tr> -->
          
          <tr>
            <td class="side-item" style="text-align: center;">
              
              <a href="leave_status" type="button" class="link" id="manage_task" style="text-decoration: none;">leave status</a>
            </td>
          </tr>
         
          <tr>
            <td class="side-item" style="text-align: center;">
              <a href="task_list" type="button" class="link" id="view_leave" style="text-decoration: none;">Task List</a>
            </td>
          </tr>
           <!-- <tr>
            <td style="text-align: center;">
              <a href="update_password" type="button" class="link" id="view_leave" style="text-decoration: none;">Update Password</a>
            </td>
          </tr>  -->
          <tr>
            <td class="side-item" style="text-align: center;">
              <a href="user_logout" type="button" class="link">Logout</a>
            </td>
          </tr>
  
        </table>
      </div>

      <!-- Main content -->
      <div class="col-md-10 p-4" style="padding: 15px;">
        {% block content%}{% endblock %}
      </div>
    </div>
  </div>

</body>
</html>
