{%extends 'user/base.html' %}

{% block content %}
  <center><h3>Apply leave</h3></center><br>
  <div class="row">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <form action="" method="POST">
            <div class="form-group">
                <input type="text" class="form-control" name="subject" placeholder="Enter the Subject">
            </div>
           
            <div class="form-group">
                <textarea class="form-control" rows="5" cols="50" name="message" placeholder="Type Message.."></textarea>
            </div>
            <div class="form-group">
                <label for="">Apply date:</label>
                <input type="date" class="form-control" name="leave_date">
            </div>
            <input type="submit" class="btn btn-warning" name="submit_leave">

        </form>

    </div>

    <div class="col-md-3"></div>
  </div>
 {% endblock %}
