{%extends 'admin/base.html' %}

{% block content %}
   
    <div class="row">
        <div class="col-md-4 m-auto" style="color: white;"> <br>
            <h3 style="color: white;">Edit the task</h3>
            <form action="" method="post">
                <div class="form-group">
                    <input type="hidden" name="id" class="form-control" value="{{task_data[0]}}" required>

                </div>
                <div class="from-group">
                    <label for="">Select user:</label>
                    <select class="form-control" name="id" required value="{{task_data[8]}}">
                        <option value="">-select-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="">Title</label>
                    <input  class="form-control" rows="3" cols="50" name="title" value="{{task_data[1]}}">
                </div>
                </div>
                <div class="form-group">
                    <label for="">Description</label>
                    <textarea  class="form-control" rows="3" cols="50" name="description" required>{{task_data[2]}}</textarea>
                </div>
                  
                    <div class="form-group">
                        <label for="">Start date:</label>
                        <input type="date" class="form-control" name="start_date" value="{{task_data[3]}}">
                    </div>
                    <div class="form-group">
                        <label for="">End date:</label>
                        <input type="date" class="form-control" name="end_date" value="{{task_data[4]}}">
                    </div>
                    <input type="submit" class="btn btn-warning" name="create task" value="update">

                

            </form>

        </div>
    
    {% endblock %}
